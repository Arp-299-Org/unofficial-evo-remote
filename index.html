<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unofficial Evo Remote</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23087f8c'/%3E%3Ccircle cx='22' cy='24' r='7' fill='%23fff'/%3E%3Ccircle cx='42' cy='24' r='7' fill='%23fff'/%3E%3Cpath d='M18 43h28' stroke='%23f6c64f' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <header>
      <h1>Unofficial Evo Remote</h1>
      <div id="status" class="status">Ready</div>
    </header>

    <section>
      <h2>Connection</h2>
      <div class="connection-row">
        <button id="connect">Connect Ozobot</button>
        <button id="disconnect" class="danger" disabled>Disconnect</button>
        <button id="connectedTo" class="connection-state" type="button">Not connected</button>
        <button id="flashColor" type="button" disabled>Flash Color</button>
      </div>
    </section>

    <div class="grid">
      <section>
        <h2>Drive</h2>
        <div class="speed">
          <span class="label">Speed</span>
          <input id="speed" type="range" min="100" max="1000" value="420">
          <strong id="speedValue">420</strong>
        </div>

        <div class="pad">
          <div></div>
          <button data-dir="forward" disabled aria-label="Forward">&uarr;</button>
          <div></div>
          <button data-dir="left" disabled aria-label="Left">&larr;</button>
          <div></div>
          <button data-dir="right" disabled aria-label="Right">&rarr;</button>
          <div></div>
          <button data-dir="reverse" disabled aria-label="Backward">&darr;</button>
          <div></div>
        </div>

        <button id="stop" class="stop-button" disabled>STOP</button>
      </section>

      <section>
        <h2>Robot</h2>
        <div class="telemetry">
          <span class="label">Selected</span><span id="robotName">None</span>
          <span class="label">State</span><span id="streamState">Idle</span>
          <span class="label">Last command</span><span id="lastCommand">none</span>
        </div>

        <div class="lights-panel">
          <h3>Lights</h3>
          <div class="color-row" role="group" aria-label="Robot light color">
            <button
              class="color-swatch selected"
              type="button"
              data-color="red"
              style="--swatch: #ef4444;"
              aria-label="Red"
              aria-pressed="true"
              title="Red"
            ></button>
            <button
              class="color-swatch"
              type="button"
              data-color="orange"
              style="--swatch: #f97316;"
              aria-label="Orange"
              aria-pressed="false"
              title="Orange"
            ></button>
            <button
              class="color-swatch"
              type="button"
              data-color="yellow"
              style="--swatch: #facc15;"
              aria-label="Yellow"
              aria-pressed="false"
              title="Yellow"
            ></button>
            <button
              class="color-swatch"
              type="button"
              data-color="green"
              style="--swatch: #22c55e;"
              aria-label="Green"
              aria-pressed="false"
              title="Green"
            ></button>
            <button
              class="color-swatch"
              type="button"
              data-color="blue"
              style="--swatch: #3b82f6;"
              aria-label="Blue"
              aria-pressed="false"
              title="Blue"
            ></button>
            <button
              class="color-swatch"
              type="button"
              data-color="purple"
              style="--swatch: #a855f7;"
              aria-label="Purple"
              aria-pressed="false"
              title="Purple"
            ></button>
            <button
              class="color-swatch"
              type="button"
              data-color="pink"
              style="--swatch: #ec4899;"
              aria-label="Pink"
              aria-pressed="false"
              title="Pink"
            ></button>
            <button
              class="color-swatch"
              type="button"
              data-color="white"
              style="--swatch: #ffffff;"
              aria-label="White"
              aria-pressed="false"
              title="White"
            ></button>
          </div>
          <div class="light-actions">
            <button id="setColor" type="button" disabled>Set Color</button>
            <button id="lightsOff" class="secondary-action" type="button" disabled>Lights Off</button>
          </div>
          <div class="effects-panel">
            <h3>Effects</h3>
            <div class="effects-row" role="group" aria-label="Light effects">
              <button data-effect="blink" type="button" disabled>Blink</button>
              <button data-effect="pulse" type="button" disabled>Pulse</button>
              <button data-effect="rainbow" type="button" disabled>Rainbow</button>
              <button data-effect="redBlue" type="button" disabled>Red/Blue</button>
              <button id="stopEffect" class="secondary-action" type="button" disabled>Stop Effect</button>
            </div>
          </div>
          <div class="sounds-panel">
            <h3>Sounds</h3>
            <div class="sounds-row" role="group" aria-label="Robot sounds">
              <button data-sound="beep" type="button" disabled>Beep</button>
              <button data-sound="boop" type="button" disabled>Boop</button>
              <button data-sound="chirp" type="button" disabled>Chirp</button>
              <button data-sound="tada" type="button" disabled>Ta-Da</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
